<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Everest Mart — Order Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── RESET & BASE ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0b0e14;
      --surface:     #12161f;
      --surface2:    #1a1f2e;
      --border:      rgba(255,255,255,0.07);
      --accent:      #e8441a;
      --accent2:     #ff6b3d;
      --gold:        #f5a623;
      --text:        #e8eaf0;
      --muted:       #6b7280;
      --green:       #22c55e;
      --blue:        #3b82f6;
      --yellow:      #eab308;
      --radius:      14px;
      --font:        'Sora', sans-serif;
      --mono:        'JetBrains Mono', monospace;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      font-family: var(--font);
      color: var(--text);
    }

    /* ── NOISE TEXTURE OVERLAY ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.4;
    }

    /* ── GLOW BLOB ── */
    body::after {
      content: '';
      position: fixed;
      top: -200px; right: -200px;
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(232,68,26,0.12) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    /* ── LAYOUT ── */
    .wrapper {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      border-bottom: 1px solid var(--border);
      background: rgba(11,14,20,0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 0 40px;
      display: flex; align-items: center; justify-content: space-between;
      height: 68px;
      position: sticky; top: 0; z-index: 100;
    }

    .logo {
      display: flex; align-items: center; gap: 12px;
      text-decoration: none;
    }

    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 20px rgba(232,68,26,0.35);
    }

    .logo-text {
      font-size: 18px; font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    .logo-text span { color: var(--accent); }

    .header-badge {
      font-size: 11px; font-weight: 500;
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 4px 10px; border-radius: 20px;
      letter-spacing: 0.5px;
    }

    /* ── MAIN CONTENT ── */
    main {
      flex: 1;
      display: flex; flex-direction: column; align-items: center;
      padding: 60px 20px 80px;
    }

    /* ── HERO ── */
    .hero {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeUp 0.6s ease both;
    }

    .hero-tag {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(232,68,26,0.1);
      border: 1px solid rgba(232,68,26,0.25);
      color: var(--accent2);
      font-size: 12px; font-weight: 600;
      padding: 5px 14px; border-radius: 20px;
      letter-spacing: 0.8px; text-transform: uppercase;
      margin-bottom: 20px;
    }

    .hero-tag::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    h1 {
      font-size: clamp(32px, 5vw, 52px);
      font-weight: 700;
      letter-spacing: -1.5px;
      line-height: 1.1;
      margin-bottom: 16px;
    }

    h1 span {
      background: linear-gradient(90deg, var(--accent), var(--gold));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: 16px; color: var(--muted);
      font-weight: 400; line-height: 1.6;
      max-width: 440px; margin: 0 auto;
    }

    /* ── SEARCH CARD ── */
    .search-card {
      width: 100%; max-width: 560px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      animation: fadeUp 0.6s 0.15s ease both;
      box-shadow: 0 24px 60px rgba(0,0,0,0.4);
    }

    .input-group {
      display: flex; gap: 10px;
    }

    .order-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      font-family: var(--mono);
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      letter-spacing: 0.5px;
    }

    .order-input::placeholder { color: var(--muted); font-family: var(--font); letter-spacing: 0; }

    .order-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232,68,26,0.15);
    }

    .track-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 10px;
      padding: 14px 24px;
      color: #fff; font-family: var(--font);
      font-size: 15px; font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(232,68,26,0.3);
      display: flex; align-items: center; gap: 8px;
    }

    .track-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(232,68,26,0.4); }
    .track-btn:active { transform: translateY(0); }
    .track-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .track-btn .btn-icon { font-size: 16px; }

    .sample-ids {
      margin-top: 16px;
      display: flex; align-items: center; flex-wrap: wrap; gap: 8px;
    }

    .sample-label { font-size: 12px; color: var(--muted); }

    .sample-chip {
      font-family: var(--mono);
      font-size: 11px; font-weight: 500;
      color: var(--accent2);
      background: rgba(232,68,26,0.08);
      border: 1px solid rgba(232,68,26,0.2);
      padding: 3px 10px; border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .sample-chip:hover { background: rgba(232,68,26,0.15); }

    /* ── RESULT CARD ── */
    .result-card {
      width: 100%; max-width: 560px;
      margin-top: 24px;
      animation: fadeUp 0.4s ease both;
    }

    /* Error State */
    .error-box {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: var(--radius);
      padding: 20px 24px;
      display: flex; align-items: center; gap: 14px;
      color: #fca5a5;
      font-size: 14px; font-weight: 500;
    }

    .error-icon { font-size: 22px; flex-shrink: 0; }

    /* Order Info Card */
    .order-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(0,0,0,0.35);
    }

    .order-header {
      padding: 20px 24px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }

    .order-id-label {
      font-size: 12px; color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.8px; margin-bottom: 4px;
    }

    .order-id-value {
      font-family: var(--mono);
      font-size: 20px; font-weight: 600;
      color: var(--text);
    }

    .status-pill {
      padding: 6px 14px; border-radius: 20px;
      font-size: 12px; font-weight: 600;
      letter-spacing: 0.3px;
    }

    .status-delivered    { background: rgba(34,197,94,0.12);  color: #4ade80; border: 1px solid rgba(34,197,94,0.25); }
    .status-out          { background: rgba(245,158,11,0.12); color: #fcd34d; border: 1px solid rgba(245,158,11,0.25); }
    .status-shipped      { background: rgba(59,130,246,0.12); color: #93c5fd; border: 1px solid rgba(59,130,246,0.25); }
    .status-processing   { background: rgba(168,85,247,0.12); color: #c4b5fd; border: 1px solid rgba(168,85,247,0.25); }
    .status-confirmed    { background: rgba(107,114,128,0.12);color: #9ca3af; border: 1px solid rgba(107,114,128,0.25); }

    .order-body { padding: 24px; }

    .info-row {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 16px; margin-bottom: 16px;
    }

    .info-item { display: flex; flex-direction: column; gap: 4px; }

    .info-key {
      font-size: 11px; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.8px;
      color: var(--muted);
    }

    .info-val {
      font-size: 14px; font-weight: 500; color: var(--text);
      line-height: 1.4;
    }

    .info-val.mono { font-family: var(--mono); font-size: 13px; color: var(--accent2); }

    /* Progress Bar */
    .progress-section { margin-top: 20px; }

    .progress-label {
      font-size: 12px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.8px;
      margin-bottom: 14px;
    }

    .steps {
      display: flex; align-items: flex-start;
      position: relative;
    }

    .steps::before {
      content: '';
      position: absolute;
      top: 13px; left: 13px; right: 13px;
      height: 2px;
      background: var(--border);
      z-index: 0;
    }

    .step {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 8px; position: relative; z-index: 1;
    }

    .step-dot {
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--surface2);
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; transition: all 0.3s;
    }

    .step.done .step-dot   { background: var(--green); border-color: var(--green); color: #fff; }
    .step.active .step-dot { background: var(--gold);  border-color: var(--gold);  color: #000;
                              box-shadow: 0 0 12px rgba(245,166,35,0.4); }

    .step-name {
      font-size: 10px; color: var(--muted); text-align: center;
      font-weight: 500; letter-spacing: 0.3px;
    }

    .step.done .step-name   { color: var(--green); }
    .step.active .step-name { color: var(--gold); }

    /* Card footer */
    .order-footer {
      padding: 14px 24px;
      background: var(--surface2);
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }

    .footer-note { font-size: 12px; color: var(--muted); }
    .footer-note strong { color: var(--text); }

    .refresh-link {
      font-size: 12px; color: var(--accent2);
      cursor: pointer; font-weight: 500;
      background: none; border: none;
      font-family: var(--font);
      transition: color 0.15s;
    }

    .refresh-link:hover { color: var(--gold); }

    /* ── LOADING ── */
    .loader {
      width: 100%; max-width: 560px;
      margin-top: 24px;
      display: none;
      justify-content: center; align-items: center;
      gap: 8px; padding: 24px;
      color: var(--muted); font-size: 14px;
    }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 24px;
      border-top: 1px solid var(--border);
      font-size: 12px; color: var(--muted);
      position: relative; z-index: 1;
    }

    footer a { color: var(--accent2); text-decoration: none; }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      header { padding: 0 20px; }
      .search-card { padding: 24px 20px; }
      .input-group { flex-direction: column; }
      .info-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="wrapper">

  <!-- HEADER -->
  <header>
    <a class="logo" href="/">
      <div class="logo-icon">🏔️</div>
      <div class="logo-text">Everest<span>Mart</span></div>
    </a>
    <div class="header-badge">Order Tracking</div>
  </header>

  <!-- MAIN -->
  <main>

    <!-- HERO -->
    <div class="hero">
      <div class="hero-tag">Real-Time Updates</div>
      <h1>Track Your<br><span>Order Status</span></h1>
      <p class="hero-sub">Enter your Everest Mart Order ID to get live updates on your shipment.</p>
    </div>

    <!-- SEARCH CARD -->
    <div class="search-card">
      <div class="input-group">
        <input
          id="orderInput"
          class="order-input"
          type="text"
          placeholder="Enter Order ID  e.g. EM1001"
          autocomplete="off"
          spellcheck="false"
        />
        <button class="track-btn" id="trackBtn" onclick="trackOrder()">
          <span class="btn-icon">🔍</span> Track
        </button>
      </div>
      <div class="sample-ids">
        <span class="sample-label">Try:</span>
        <span class="sample-chip" onclick="fillSample('EM1001')">EM1001</span>
        <span class="sample-chip" onclick="fillSample('EM1002')">EM1002</span>
        <span class="sample-chip" onclick="fillSample('EM1003')">EM1003</span>
        <span class="sample-chip" onclick="fillSample('EM1004')">EM1004</span>
        <span class="sample-chip" onclick="fillSample('EM1005')">EM1005</span>
      </div>
    </div>

    <!-- LOADER -->
    <div class="loader" id="loader">
      <div class="spinner"></div>
      Fetching order details…
    </div>

    <!-- RESULT -->
    <div class="result-card" id="resultCard" style="display:none;"></div>

  </main>

  <!-- FOOTER -->
  <footer>
    © 2025 <a href="#">Everest Mart</a> · Powered by Flask · All rights reserved
  </footer>

</div>

<script>
  const STATUS_STEPS = {
    confirmed:        1,
    processing:       2,
    shipped:          3,
    out_for_delivery: 4,
    delivered:        5
  };

  const STEP_LABELS = ['Confirmed', 'Processing', 'Shipped', 'Out for Delivery', 'Delivered'];
  const STEP_ICONS  = ['✓', '⚙', '🚚', '📦', '✅'];

  const STATUS_CLASS = {
    confirmed:        'status-confirmed',
    processing:       'status-processing',
    shipped:          'status-shipped',
    out_for_delivery: 'status-out',
    delivered:        'status-delivered'
  };

  function fillSample(id) {
    document.getElementById('orderInput').value = id;
    trackOrder();
  }

  async function trackOrder() {
    const input   = document.getElementById('orderInput').value.trim();
    const loader  = document.getElementById('loader');
    const result  = document.getElementById('resultCard');
    const btn     = document.getElementById('trackBtn');

    if (!input) {
      result.style.display = 'block';
      result.innerHTML = errorBox('Please enter an Order ID before tracking.');
      return;
    }

    // Show loader
    result.style.display = 'none';
    loader.style.display = 'flex';
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner" style="border-top-color:#fff; width:14px; height:14px;"></div> Tracking…';

    try {
      const res  = await fetch('/track', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ order_id: input })
      });

      const data = await res.json();

      loader.style.display = 'none';
      result.style.display = 'block';

      if (!data.success) {
        result.innerHTML = errorBox(data.error || 'Order not found.');
      } else {
        result.innerHTML = buildOrderCard(data.order);
      }

    } catch (err) {
      loader.style.display = 'none';
      result.style.display = 'block';
      result.innerHTML = errorBox('Could not connect to the server. Make sure Flask is running.');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<span class="btn-icon">🔍</span> Track';
    }
  }

  function errorBox(msg) {
    return `
      <div class="error-box">
        <span class="error-icon">⚠️</span>
        <span>${msg}</span>
      </div>`;
  }

  function buildOrderCard(o) {
    const statusClass = STATUS_CLASS[o.status_code] || 'status-confirmed';
    const currentStep = STATUS_STEPS[o.status_code] || 1;

    const stepsHTML = STEP_LABELS.map((label, i) => {
      const step = i + 1;
      let cls = '';
      if (step < currentStep)  cls = 'done';
      if (step === currentStep) cls = 'active';
      const icon = step < currentStep ? '✓' : STEP_ICONS[i];
      return `
        <div class="step ${cls}">
          <div class="step-dot">${icon}</div>
          <div class="step-name">${label}</div>
        </div>`;
    }).join('');

    const trackingDisplay = o.tracking_id === 'PENDING'
      ? '<span style="color:var(--muted)">Not assigned yet</span>'
      : `<span class="mono">${o.tracking_id}</span>`;

    return `
      <div class="order-card">
        <div class="order-header">
          <div>
            <div class="order-id-label">Order ID</div>
            <div class="order-id-value">${o.order_id}</div>
          </div>
          <div class="status-pill ${statusClass}">${o.order_status}</div>
        </div>

        <div class="order-body">
          <div class="info-row">
            <div class="info-item">
              <div class="info-key">Customer</div>
              <div class="info-val">${o.customer_name}</div>
            </div>
            <div class="info-item">
              <div class="info-key">Carrier</div>
              <div class="info-val">${o.carrier}</div>
            </div>
          </div>

          <div class="info-row">
            <div class="info-item">
              <div class="info-key">Order Date</div>
              <div class="info-val">${formatDate(o.order_date)}</div>
            </div>
            <div class="info-item">
              <div class="info-key">Est. Delivery</div>
              <div class="info-val">${formatDate(o.estimated_delivery)}</div>
            </div>
          </div>

          <div class="info-item" style="margin-bottom:16px;">
            <div class="info-key">Product</div>
            <div class="info-val">${o.product_name}</div>
          </div>

          <div class="info-item">
            <div class="info-key">Tracking ID</div>
            <div class="info-val">${trackingDisplay}</div>
          </div>

          <div class="progress-section">
            <div class="progress-label">Shipment Progress</div>
            <div class="steps">${stepsHTML}</div>
          </div>
        </div>

        <div class="order-footer">
          <span class="footer-note">Last updated: <strong>Just now</strong></span>
          <button class="refresh-link" onclick="trackOrder()">↻ Refresh</button>
        </div>
      </div>`;
  }

  function formatDate(dateStr) {
    if (!dateStr) return '—';
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  // Allow Enter key
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('orderInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') trackOrder();
    });
  });
</script>
</body>
</html>
